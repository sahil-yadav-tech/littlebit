name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/chat-frontend:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/chat-frontend:latest

      - name: Deploy To EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Check Docker permissions
            echo "Checking Docker permissions..."
            if ! docker ps &> /dev/null; then
              echo "Adding user to docker group..."
              sudo usermod -aG docker ubuntu
              echo "Please restart the workflow after group changes take effect"
              exit 1
            fi

            echo "Pull latest image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/chat-frontend:latest

            echo "Stop and remove old container..."
            docker stop chat-app 2>/dev/null || true
            docker rm chat-app 2>/dev/null || true

            echo "Run new container..."
            docker run -d \
              --restart unless-stopped \
              --name chat-app \
              --env-file /home/ubuntu/.env \
              -p 3000:3000 \
              ${{ secrets.DOCKER_USERNAME }}/chat-frontend:latest

            echo "Remove unused images..."
            docker image prune -af || true

            echo "Container status..."
            docker ps

            echo "Container logs..."
            docker logs chat-app --tail 50