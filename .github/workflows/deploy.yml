name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            -t ${{ secrets.DOCKER_USERNAME }}/chat-frontend:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/chat-frontend:latest

      - name: Deploy To EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Pull latest image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/chat-frontend:latest

            echo "Remove old container..."
            docker rm -f chat-app || true

            echo "Run new container..."
            docker run -d \
              --restart unless-stopped \
              --name chat-app \
              --env-file /home/ubuntu/.env \
              -p 3000:3000 \
              ${{ secrets.DOCKER_USERNAME }}/chat-frontend:latest

            echo "Remove unused images..."
            docker image prune -af || true

            echo "Running containers..."
            docker ps

            echo "Container logs..."
            docker logs chat-app --tail 50