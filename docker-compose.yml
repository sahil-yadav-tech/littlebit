services:
  frontend:
    image: YOUR_DOCKER_USERNAME/chat-frontend:latest 

    container_name: chat-app

    restart: unless-stopped

    env_file:
      - /home/ubuntu/.env

    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine

    container_name: nginx

    restart: unless-stopped

    depends_on:
      - frontend

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
